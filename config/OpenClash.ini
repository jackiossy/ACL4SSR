[custom]
; ====== 核心规则（最短路径）======

; AI（优先）
ruleset=🤖 AI,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.list

; Telegram
ruleset=📲 Telegram,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.list

; GitHub
ruleset=👨‍💻 GitHub,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.list

; Google
ruleset=🍀 Google,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list

; Apple（必须在 CN 前）
ruleset=🍎 Apple,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list

; 局域网
ruleset=🎯 直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list

; 中国流量（核心判断）
ruleset=🎯 直连,[]GEOSITE,CN
ruleset=🎯 直连,[]GEOIP,CN

; 最终兜底
ruleset=🐟 漏网之鱼,[]FINAL


; ====== 策略组（极简 + fallback）======

; 主入口
custom_proxy_group=🚀 节点选择`select`[]🔁 自动容灾`[]DIRECT`[]🇭🇰 香港`[]🇯🇵 日本`[]🇸🇬 新加坡`[]🇺🇸 美国

; fallback（不测速，低开销自动切换）
custom_proxy_group=🔁 自动容灾`fallback`(?!(0\.2|0\.5|低倍率|实验|试验|低倍|体验)).*`http://www.gstatic.com/generate_204`300,,50

; ====== 业务分组 ======

custom_proxy_group=🤖 AI`select`[]🇺🇸 美国`[]🇯🇵 日本`[]🇸🇬 新加坡`[]🇭🇰 香港`[]🚀 节点选择
custom_proxy_group=📲 Telegram`select`[]🚀 节点选择`[]🇸🇬 新加坡`[]🇯🇵 日本
custom_proxy_group=👨‍💻 GitHub`select`[]🚀 节点选择`[]DIRECT
custom_proxy_group=🍀 Google`select`[]🚀 节点选择`[]🔁 自动容灾
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🚀 节点选择

; ====== 基础分组 ======

custom_proxy_group=🎯 直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]DIRECT


; ====== 地区节点（精简识别）======

custom_proxy_group=🇭🇰 香港`select`(?i)(香港|hk|hongkong)
custom_proxy_group=🇯🇵 日本`select`(?i)(日本|jp|japan|东京|osaka)
custom_proxy_group=🇸🇬 新加坡`select`(?i)(新加坡|sg|singapore)
custom_proxy_group=🇺🇸 美国`select`(?i)(美国|us|unitedstates|losangeles|silicon)


; ====== 低倍率节点（保留你的玩法）======

custom_proxy_group=🔯 低倍率`select`(?i)(0\.2|0\.5|低倍率|实验|试验|低倍|体验)


; ====== 开关 ======
enable_rule_generator=true
overwrite_original_rules=true